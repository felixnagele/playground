name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  ci-config:
    name: CI Config
    runs-on: ubuntu-latest
    permissions: {}
    outputs:
      python_version: ${{ steps.values.outputs.python_version }}
      node_version: ${{ steps.values.outputs.node_version }}
      job_timeout_minutes: ${{ steps.values.outputs.job_timeout_minutes }}
      npm_ci_flags: ${{ steps.values.outputs.npm_ci_flags }}
      npm_install_flags: ${{ steps.values.outputs.npm_install_flags }}
    steps:
      - name: Export shared values
        id: values
        run: |
          echo "python_version=3.14" >> "$GITHUB_OUTPUT"
          echo "node_version=24" >> "$GITHUB_OUTPUT"
          echo "job_timeout_minutes=15" >> "$GITHUB_OUTPUT"
          echo "npm_ci_flags=--no-audit --no-fund" >> "$GITHUB_OUTPUT"
          echo "npm_install_flags=--no-audit --no-fund" >> "$GITHUB_OUTPUT"

  discover-projects:
    name: Discover Projects
    needs: ci-config
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      python_projects: ${{ steps.discover.outputs.python_projects }}
      typescript_projects: ${{ steps.discover.outputs.typescript_projects }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ needs.ci-config.outputs.python_version }}

      - name: Discover matrices
        id: discover
        run: python .github/scripts/discover_projects.py

  python-tests:
    name: Python (${{ matrix.project }})
    needs: [ci-config, discover-projects]
    if: ${{ (needs.discover-projects.outputs.python_projects || '[]') != '[]' }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        project: ${{ fromJson(needs.discover-projects.outputs.python_projects || '[]') }}
    uses: ./.github/workflows/template-python.yml
    with:
      project_path: python/${{ matrix.project }}
      python_version: ${{ needs.ci-config.outputs.python_version }}
      job_timeout_minutes: ${{ fromJson(needs.ci-config.outputs.job_timeout_minutes) }}

  typescript-tests:
    name: TypeScript (${{ matrix.project }})
    needs: [ci-config, discover-projects]
    if: ${{ (needs.discover-projects.outputs.typescript_projects || '[]') != '[]' }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        project: ${{ fromJson(needs.discover-projects.outputs.typescript_projects || '[]') }}
    uses: ./.github/workflows/template-typescript.yml
    with:
      project_path: typescript/${{ matrix.project }}
      node_version: ${{ needs.ci-config.outputs.node_version }}
      job_timeout_minutes: ${{ fromJson(needs.ci-config.outputs.job_timeout_minutes) }}
      npm_ci_flags: ${{ needs.ci-config.outputs.npm_ci_flags }}
      npm_install_flags: ${{ needs.ci-config.outputs.npm_install_flags }}

  ci-success:
    needs: [ci-config, discover-projects, python-tests, typescript-tests]
    runs-on: ubuntu-latest
    if: always()
    permissions: {}
    steps:
      - name: Gateway Logic
        run: |
          RESULTS='${{ toJson(needs.*.result) }}'
          echo "Job results to check: $RESULTS"

          if echo "$RESULTS" | grep -qE 'failure|cancelled'; then
            echo "Critical failure or cancellation detected in jobs."
            exit 1
          fi

          if [ "$RESULTS" = "[]" ] || [ -z "$RESULTS" ]; then
            echo "No job results found. Check your configuration."
            exit 1
          fi

          echo "All mandatory checks passed or were safely skipped."
