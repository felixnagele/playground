name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  python-tests:
    name: Python (${{ matrix.project }})
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        project: [backup, check, github_stats, paint2d, sync]
    uses: ./.github/workflows/template-python.yml
    with:
      project_path: python/${{ matrix.project }}

  typescript-tests:
    name: TypeScript (${{ matrix.project }})
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        project: [cache, password_checker]
    uses: ./.github/workflows/template-typescript.yml
    with:
      project_path: typescript/${{ matrix.project }}

  ci-success:
    needs: [python-tests, typescript-tests]
    runs-on: ubuntu-latest
    if: always()
    permissions: {}
    steps:
      - name: Gateway Logic
        run: |
          RESULTS='${{ toJson(needs.*.result) }}'
          echo "Job results to check: $RESULTS"

          if echo "$RESULTS" | grep -qE 'failure|cancelled'; then
            echo "Critical failure or cancellation detected in jobs."
            exit 1
          fi

          if [ "$RESULTS" = "[]" ] || [ -z "$RESULTS" ]; then
            echo "No job results found. Check your configuration."
            exit 1
          fi

          echo "All mandatory checks passed or were safely skipped."
