name: CI Python Template

on:
  workflow_call:
    inputs:
      project_path:
        required: true
        type: string

permissions:
  contents: read

jobs:
  run-test:
    name: Test (${{ inputs.project_path }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            python/**/requirements.txt
            pytest.ini

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pytest-timeout
          if [ -f "${{ inputs.project_path }}/requirements.txt" ]; then
            python -m pip install -r "${{ inputs.project_path }}/requirements.txt"
          fi

      - name: Run tests
        env:
          CI: true
        run: pytest "${{ inputs.project_path }}/tests" -q
