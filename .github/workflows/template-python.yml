name: CI Python Template

on:
  workflow_call:
    inputs:
      project_path:
        required: true
        type: string
      python_version:
        required: false
        type: string
        default: '3.14'
      job_timeout_minutes:
        required: false
        type: number
        default: 15

permissions: {}

env:
  PYTHON_VERSION: ${{ inputs.python_version }}

jobs:
  quality:
    name: Quality (${{ inputs.project_path }})
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.job_timeout_minutes }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Setup uv with Python ${{ env.PYTHON_VERSION }}
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-suffix: ${{ inputs.project_path }}
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: uv sync --frozen --directory ${{ inputs.project_path }}
      - name: Check formatting (Ruff)
        run: uv run --directory ${{ inputs.project_path }} ruff format --check .
      - name: Run linting (Ruff)
        run: uv run --directory ${{ inputs.project_path }} ruff check .
      - name: Run type checking (Mypy)
        run: uv run --directory ${{ inputs.project_path }} mypy .
      - name: Check if tests exist
        id: has-tests
        shell: bash
        run: |
          cd "${{ inputs.project_path }}"
          if [ -d tests ] && find tests -name 'test_*.py' -maxdepth 1 | grep -q .; then
            echo "has_tests=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_tests=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Run tests
        if: steps.has-tests.outputs.has_tests == 'true'
        env:
          CI: true
        run: uv run --directory ${{ inputs.project_path }} pytest
      - name: Skip tests (no suite found)
        if: steps.has-tests.outputs.has_tests != 'true'
        run: echo "No tests found for ${{ inputs.project_path }}, skipping test run."
