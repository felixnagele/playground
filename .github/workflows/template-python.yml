name: CI Python Template

on:
  workflow_call:
    inputs:
      project_path:
        required: true
        type: string

permissions: {}

jobs:
  format:
    name: Format (${{ inputs.project_path }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: ${{ inputs.project_path }}/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install black
          if [ -f "${{ inputs.project_path }}/requirements.txt" ]; then
            python -m pip install -r "${{ inputs.project_path }}/requirements.txt"
          fi

      - name: Check formatting (Black)
        run: black --check "${{ inputs.project_path }}"

  lint:
    name: Lint (${{ inputs.project_path }})
    needs: format
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: ${{ inputs.project_path }}/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff
          if [ -f "${{ inputs.project_path }}/requirements.txt" ]; then
            python -m pip install -r "${{ inputs.project_path }}/requirements.txt"
          fi

      - name: Run linting (Ruff)
        run: ruff check "${{ inputs.project_path }}"

  typecheck:
    name: Typecheck (${{ inputs.project_path }})
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: ${{ inputs.project_path }}/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install mypy
          if [ -f "${{ inputs.project_path }}/requirements.txt" ]; then
            python -m pip install -r "${{ inputs.project_path }}/requirements.txt"
          fi

      - name: Run static type checking (Mypy)
        run: mypy --strict "${{ inputs.project_path }}"

  tests:
    name: Tests (${{ inputs.project_path }})
    needs: typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: ${{ inputs.project_path }}/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pytest-timeout
          if [ -f "${{ inputs.project_path }}/requirements.txt" ]; then
            python -m pip install -r "${{ inputs.project_path }}/requirements.txt"
          fi

      - name: Check if tests exist
        id: has-tests
        shell: bash
        run: |
          if [ -d "${{ inputs.project_path }}/tests" ] && find "${{ inputs.project_path }}/tests" -name 'test_*.py' | grep -q .; then
            echo "has_tests=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_tests=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run tests
        if: steps.has-tests.outputs.has_tests == 'true'
        env:
          CI: true
        run: pytest "${{ inputs.project_path }}/tests" -q

      - name: Skip tests (no suite found)
        if: steps.has-tests.outputs.has_tests != 'true'
        run: echo "No tests found for ${{ inputs.project_path }}, skipping test run."
