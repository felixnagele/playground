name: CI TypeScript Template

on:
  workflow_call:
    inputs:
      project_path:
        required: true
        type: string
      node_version:
        required: false
        type: string
        default: '24'
      job_timeout_minutes:
        required: false
        type: number
        default: 15
      npm_ci_flags:
        required: false
        type: string
        default: '--no-audit --no-fund'
      npm_install_flags:
        required: false
        type: string
        default: '--no-audit --no-fund'

permissions: {}

env:
  NODE_VERSION: ${{ inputs.node_version }}
  NPM_CI_FLAGS: ${{ inputs.npm_ci_flags }}
  NPM_INSTALL_FLAGS: ${{ inputs.npm_install_flags }}

jobs:
  format:
    name: Format (${{ inputs.project_path }})
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.job_timeout_minutes }}
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ inputs.project_path }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ inputs.project_path }}
        run: npm ci ${NPM_CI_FLAGS}

      - name: Install formatter
        working-directory: ${{ inputs.project_path }}
        run: npm install --no-save ${NPM_INSTALL_FLAGS} prettier

      - name: Check formatting (Prettier)
        working-directory: ${{ inputs.project_path }}
        run: npx prettier --check .

  lint:
    name: Lint (${{ inputs.project_path }})
    needs: format
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.job_timeout_minutes }}
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ inputs.project_path }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ inputs.project_path }}
        run: npm ci ${NPM_CI_FLAGS}

      - name: Install lint tools
        working-directory: ${{ inputs.project_path }}
        run: npm install --no-save ${NPM_INSTALL_FLAGS} eslint @typescript-eslint/parser @typescript-eslint/eslint-plugin

      - name: Run linting (ESLint)
        shell: bash
        run: bash .github/scripts/run_ts_lint.sh "${{ inputs.project_path }}"

  typecheck:
    name: Typecheck (${{ inputs.project_path }})
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.job_timeout_minutes }}
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ inputs.project_path }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ inputs.project_path }}
        run: npm ci ${NPM_CI_FLAGS}

      - name: Run static type checking (TypeScript)
        working-directory: ${{ inputs.project_path }}
        run: npx tsc --noEmit --pretty false

  tests:
    name: Tests (${{ inputs.project_path }})
    needs: typecheck
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.job_timeout_minutes }}
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ inputs.project_path }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ inputs.project_path }}
        run: npm ci ${NPM_CI_FLAGS}

      - name: Check if tests are configured
        id: has-tests
        working-directory: ${{ inputs.project_path }}
        shell: bash
        run: |
          TEST_SCRIPT=$(node -e "const p=require('./package.json'); const s=((p.scripts||{}).test||'').trim().toLowerCase(); process.stdout.write(s && !s.includes('no test specified') ? 'true' : 'false');")
          echo "has_tests=${TEST_SCRIPT}" >> "$GITHUB_OUTPUT"

      - name: Run tests
        if: steps.has-tests.outputs.has_tests == 'true'
        working-directory: ${{ inputs.project_path }}
        env:
          CI: true
        run: npm test

      - name: Skip tests (no suite configured)
        if: steps.has-tests.outputs.has_tests != 'true'
        working-directory: ${{ inputs.project_path }}
        run: echo "No tests configured for ${{ inputs.project_path }}, skipping test run."
