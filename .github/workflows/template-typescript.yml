name: CI TypeScript Template

on:
  workflow_call:
    inputs:
      project_path:
        required: true
        type: string
      node_version:
        required: false
        type: string
        default: '24'
      job_timeout_minutes:
        required: false
        type: number
        default: 15
permissions: {}

env:
  NODE_VERSION: ${{ inputs.node_version }}

jobs:
  quality:
    name: Quality (${{ inputs.project_path }})
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.job_timeout_minutes }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install dependencies
        working-directory: ${{ inputs.project_path }}
        shell: bash
        run: |
          if [ -f pnpm-lock.yaml ]; then
            echo "PM=pnpm" >> "$GITHUB_ENV"
            corepack enable && corepack prepare pnpm@latest --activate
            pnpm install --frozen-lockfile --ignore-scripts --config.minimumReleaseAge=0
          elif [ -f package-lock.json ]; then
            echo "PM=npm" >> "$GITHUB_ENV"
            npm ci
          elif [ -f yarn.lock ]; then
            echo "PM=yarn" >> "$GITHUB_ENV"
            yarn install --frozen-lockfile
          elif [ -f bun.lockb ]; then
            echo "PM=bun" >> "$GITHUB_ENV"
            bun install --frozen-lockfile
          else
            echo "Unsupported: none of pnpm-lock.yaml, package-lock.json, yarn.lock, bun.lockb found"
            exit 1
          fi
      - name: Check formatting (Prettier)
        working-directory: ${{ inputs.project_path }}
        shell: bash
        run: |
          HAS_PRETTIER=false
          [ -f .prettierrc ] && HAS_PRETTIER=true
          ls .prettierrc.* 2>/dev/null | grep -q . && HAS_PRETTIER=true
          [ -f prettier.config.js ] && HAS_PRETTIER=true
          [ -f prettier.config.cjs ] && HAS_PRETTIER=true
          grep -q '"prettier"' package.json 2>/dev/null && HAS_PRETTIER=true

          if [ "$HAS_PRETTIER" = "true" ]; then
            # Ignore lockfiles and CI artifacts to avoid spurious failures
            PRETTIER_IGNORE_FILE=.prettierignore
            [ -f "$PRETTIER_IGNORE_FILE" ] && cp "$PRETTIER_IGNORE_FILE" "${PRETTIER_IGNORE_FILE}.bak"
            for pattern in pnpm-lock.yaml package-lock.json yarn.lock bun.lockb .ci-*; do
              echo "$pattern" >> "$PRETTIER_IGNORE_FILE"
            done
            npx prettier --check .
            [ -f "${PRETTIER_IGNORE_FILE}.bak" ] && mv "${PRETTIER_IGNORE_FILE}.bak" "$PRETTIER_IGNORE_FILE" || rm -f "$PRETTIER_IGNORE_FILE"
          else
            echo "No Prettier config found, skipping format check."
          fi
      - name: Run linting (ESLint)
        working-directory: ${{ inputs.project_path }}
        shell: bash
        run: |
          for f in eslint.config.js eslint.config.mjs eslint.config.cjs eslint.config.ts; do
            [ -f "$f" ] && { npx eslint .; exit 0; }
          done
          for f in .eslintrc .eslintrc.js .eslintrc.cjs .eslintrc.json .eslintrc.yaml .eslintrc.yml; do
            [ -f "$f" ] && { ESLINT_USE_FLAT_CONFIG=false npx eslint .; exit 0; }
          done
          grep -q '"eslintConfig"' package.json && { ESLINT_USE_FLAT_CONFIG=false npx eslint .; exit 0; }
          echo "No local ESLint config found, skipping lint."
      - name: Run type checking (TypeScript)
        working-directory: ${{ inputs.project_path }}
        shell: bash
        run: npx tsc --noEmit --pretty false
      - name: Run tests
        working-directory: ${{ inputs.project_path }}
        shell: bash
        run: |
          if ! grep -q '"test"[[:space:]]*:' package.json; then
            echo "No test script in package.json for ${{ inputs.project_path }}, skipping."
            exit 0
          fi

          if grep -q '"vitest"' package.json; then
            CI=true npx vitest run --coverage.enabled=false
          else
            case "$PM" in
              pnpm) CI=true pnpm test ;;
              npm) CI=true npm test ;;
              yarn) CI=true yarn test ;;
              bun) CI=true bun test ;;
              *) CI=true npm test ;;
            esac
          fi
