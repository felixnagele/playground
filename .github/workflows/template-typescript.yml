name: CI TypeScript Template

on:
  workflow_call:
    inputs:
      project_path:
        required: true
        type: string

permissions: {}

jobs:
  format:
    name: Format (${{ inputs.project_path }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: ${{ inputs.project_path }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ inputs.project_path }}
        run: npm ci --no-audit --no-fund

      - name: Install formatter
        working-directory: ${{ inputs.project_path }}
        run: npm install --no-save --no-audit --no-fund prettier

      - name: Check formatting (Prettier)
        working-directory: ${{ inputs.project_path }}
        run: npx prettier --check .

  lint:
    name: Lint (${{ inputs.project_path }})
    needs: format
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: ${{ inputs.project_path }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ inputs.project_path }}
        run: npm ci --no-audit --no-fund

      - name: Install lint tools
        working-directory: ${{ inputs.project_path }}
        run: npm install --no-save --no-audit --no-fund eslint @typescript-eslint/parser @typescript-eslint/eslint-plugin

      - name: Run linting (ESLint)
        working-directory: ${{ inputs.project_path }}
        shell: bash
        run: |
          if [ ! -f "eslint.config.js" ] && [ ! -f "eslint.config.mjs" ] && [ ! -f "eslint.config.cjs" ] && [ ! -f "eslint.config.ts" ]; then
            cat > .ci-eslint.config.mjs <<'EOF'
            import tsParser from "@typescript-eslint/parser";
            import tsPlugin from "@typescript-eslint/eslint-plugin";

            export default [
              {
                files: ["**/*.ts", "**/*.tsx"],
                ignores: ["node_modules/**", "dist/**", "coverage/**"],
                languageOptions: {
                  parser: tsParser,
                  parserOptions: {
                    project: ["./tsconfig.json"],
                    tsconfigRootDir: process.cwd(),
                    sourceType: "module",
                    ecmaVersion: "latest"
                  }
                },
                plugins: {
                  "@typescript-eslint": tsPlugin
                },
                rules: {
                  ...tsPlugin.configs.recommended.rules,
                  ...tsPlugin.configs["recommended-type-checked"].rules
                }
              }
            ];
            EOF
            npx eslint --config .ci-eslint.config.mjs .
          else
            npx eslint .
          fi

  typecheck:
    name: Typecheck (${{ inputs.project_path }})
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: ${{ inputs.project_path }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ inputs.project_path }}
        run: npm ci --no-audit --no-fund

      - name: Run static type checking (TypeScript)
        working-directory: ${{ inputs.project_path }}
        run: npx tsc --noEmit --pretty false

  tests:
    name: Tests (${{ inputs.project_path }})
    needs: typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: ${{ inputs.project_path }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ inputs.project_path }}
        run: npm ci --no-audit --no-fund

      - name: Check if tests are configured
        id: has-tests
        working-directory: ${{ inputs.project_path }}
        shell: bash
        run: |
          TEST_SCRIPT=$(node -e "const p=require('./package.json'); const s=((p.scripts||{}).test||'').trim().toLowerCase(); process.stdout.write(s && !s.includes('no test specified') ? 'true' : 'false');")
          echo "has_tests=${TEST_SCRIPT}" >> "$GITHUB_OUTPUT"

      - name: Run tests
        if: steps.has-tests.outputs.has_tests == 'true'
        working-directory: ${{ inputs.project_path }}
        env:
          CI: true
        run: npm test

      - name: Skip tests (no suite configured)
        if: steps.has-tests.outputs.has_tests != 'true'
        working-directory: ${{ inputs.project_path }}
        run: echo "No tests configured for ${{ inputs.project_path }}, skipping test run."
