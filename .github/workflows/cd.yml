name: CD

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Package Release Artifact
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push') }}
    permissions:
      contents: read
      actions: write

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Build release bundle
        id: package
        shell: bash
        run: |
          FULL_SHA="${{ github.event.workflow_run.head_sha || github.sha }}"

          BUNDLE_DIR="${{ runner.temp }}/artifacts"
          mkdir -p "$BUNDLE_DIR"

          BUNDLE_PATH="$BUNDLE_DIR/playground-${FULL_SHA}.tar.gz"

          tar -czf "$BUNDLE_PATH" \
            --exclude='.git' \
            --exclude='.github' \
            .

          cd "$BUNDLE_DIR" && sha256sum "$(basename "$BUNDLE_PATH")" > "playground-${FULL_SHA}.tar.gz.sha256"

          echo "output_dir=$BUNDLE_DIR" >> "$GITHUB_OUTPUT"
          echo "full_sha=$FULL_SHA" >> "$GITHUB_OUTPUT"

      - name: Upload release bundle
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: release-bundle-${{ steps.package.outputs.full_sha }}
          path: ${{ steps.package.outputs.output_dir }}/*
          retention-days: 90
          if-no-files-found: error

  cd-success:
    needs: [deploy]
    if: ${{ always() && needs.deploy.result != 'skipped' }}
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Gateway Logic
        run: |
          RESULTS='${{ toJson(needs.*.result) }}'
          echo "Job results to check: $RESULTS"

          if echo "$RESULTS" | grep -qE 'failure|cancelled'; then
            echo "Critical failure or cancellation detected in jobs."
            exit 1
          fi

          if [ "$RESULTS" = "[]" ] || [ -z "$RESULTS" ]; then
            echo "No job results found. Check your configuration."
            exit 1
          fi

          echo "All mandatory checks passed or were safely skipped."
